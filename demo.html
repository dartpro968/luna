<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luna AI - Dating Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --card-bg: #1a1a24;
      --primary: #a855f7;
      --nope: #ef4444;
      --like: #22c55e;
      --text: #ffffff;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* Header */
    .header {
      padding: 20px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(5,5,8,1) 0%, rgba(5,5,8,0) 100%);
    }
    .header-logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .header-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; }

    /* Card Stack */
    .deck {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .card {
      position: absolute;
      width: 90%;
      height: 90%;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      will-change: transform;
      transform-origin: 50% 100%;
      cursor: grab;
    }
    .card:active { cursor: grabbing; }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .card-content {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 30px 20px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      z-index: 2;
    }

    .card-title { font-size: 2rem; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
    .card-age { font-weight: 400; font-size: 1.5rem; }
    .card-location { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    .card-bio { font-size: 1rem; line-height: 1.4; color: #eee; margin-bottom: 15px; }
    
    .tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; backdrop-filter: blur(5px); }

    /* Action Buttons */
    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px 20px 30px;
      z-index: 10;
    }
    
    .btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    .btn.nope { background: #1a1a24; color: var(--nope); border: 2px solid rgba(239, 68, 68, 0.3); }
    .btn.like { background: #1a1a24; color: var(--like); border: 2px solid rgba(34, 197, 94, 0.3); }
    
    /* Match Screen */
    .match-screen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .match-screen.show { opacity: 1; pointer-events: all; }
    
    .match-title {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
      transform: scale(0.5);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .match-screen.show .match-title { transform: scale(1) rotate(-5deg); }
    
    .match-avatars { display: flex; gap: -20px; margin-bottom: 40px; }
    .match-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg); object-fit: cover; }
    .match-avatar:first-child { transform: translateX(20px); z-index: 2; }
    .match-avatar:last-child { transform: translateX(-20px); z-index: 1; }
    
    .match-btn { background: var(--primary); color: white; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: 600; border: none; cursor: pointer; margin-bottom: 15px; width: 80%; max-width: 300px; }
    .match-btn-secondary { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; font-size: 1rem; cursor: pointer; width: 80%; max-width: 300px; }

    /* Stamps */
    .stamp {
      position: absolute;
      top: 40px;
      padding: 5px 15px;
      border: 4px solid;
      border-radius: 10px;
      font-size: 2.5rem;
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0;
      z-index: 10;
    }
    .stamp.nope { right: 30px; color: var(--nope); border-color: var(--nope); transform: rotate(15deg); }
    .stamp.like { left: 30px; color: var(--like); border-color: var(--like); transform: rotate(-15deg); }
    
    /* End State */
    .end-state {
      position: absolute;
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.5);
      z-index: 0;
    }
    .end-state p { margin-top: 10px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-icon">👤</div>
    <div class="header-logo">Luna AI</div>
    <div class="header-icon">💬</div>
  </header>

  <div class="deck" id="deck">
    <div class="end-state">
      <div style="font-size: 3rem;">🌟</div>
      <p>No more profiles nearby.</p>
      <p style="font-size: 0.8rem; margin-top: 20px; cursor: pointer; color: var(--primary);" onclick="location.reload()">Refresh Queue</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn nope" onclick="triggerSwipe('left')">✖</button>
    <button class="btn like" onclick="triggerSwipe('right')">♥</button>
  </div>

  <div class="match-screen" id="matchScreen">
    <div class="match-title">It's a Match!</div>
    <div class="match-avatars">
      <img src="C:/Users/abhishek/.gemini/antigravity/brain/9347d03a-ff4c-4d93-a1cd-e73d918bb0f1/ai_dating_girl_1776579811175.png" class="match-avatar" style="background:#333;">
      <img src="C:/Users/abhishek/.gemini/antigravity/brain/9347d03a-ff4c-4d93-a1cd-e73d918bb0f1/ai_dating_boy_1776579833020.png" class="match-avatar" id="matchPartnerImg" style="background:#555;">
    </div>
    <button class="match-btn" onclick="document.getElementById('matchScreen').classList.remove('show')">Send a Message</button>
    <button class="match-btn-secondary" onclick="document.getElementById('matchScreen').classList.remove('show')">Keep Swiping</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script>
    const deck = document.getElementById('deck');
    
    // Sample Data
    const profiles = [
      {
        id: '2',
        name: 'Arjun',
        age: '26',
        distance: '5 miles away',
        bio: "Finance over day, gamer by night. Looking for someone who doesn't mind me talking about stock markets or Elden Ring lore.",
        image: 'C:/Users/abhishek/.gemini/antigravity/brain/9347d03a-ff4c-4d93-a1cd-e73d918bb0f1/ai_dating_boy_1776579833020.png',
        tags: ['Finance', 'Gamer', 'Coffee Addict']
      },
      {
        id: '1',
        name: 'Priya',
        age: '27',
        distance: '2 miles away',
        bio: "Chandigarh girl living my best life. Will feed you dal makhani and roast you lovingly. Let's grab chai.",
        image: 'C:/Users/abhishek/.gemini/antigravity/brain/9347d03a-ff4c-4d93-a1cd-e73d918bb0f1/ai_dating_girl_1776579811175.png',
        tags: ['Foodie', 'Desi Fire', 'Bhangra']
      }
    ];

    let cards = [];
    
    function initCards() {
      profiles.forEach((profile, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.zIndex = i + 1;
        
        card.innerHTML = `
          <img src="${profile.image}" class="card-image">
          <div class="stamp nope">NOPE</div>
          <div class="stamp like">LIKE</div>
          <div class="card-content">
            <div class="card-title">${profile.name} <span class="card-age">${profile.age}</span></div>
            <div class="card-location">📍 ${profile.distance}</div>
            <div class="card-bio">${profile.bio}</div>
            <div class="tags">
              ${profile.tags.map(t => `<div class="tag">${t}</div>`).join('')}
            </div>
          </div>
        `;
        
        deck.appendChild(card);
        cards.push({ element: card, profile: profile });
        setupCardInteraction(card);
      });
    }

    function setupCardInteraction(card) {
      const hammertime = new Hammer(card);
      let x = 0, y = 0, isDragging = false;
      const stampNope = card.querySelector('.stamp.nope');
      const stampLike = card.querySelector('.stamp.like');

      hammertime.on('pan', e => {
        isDragging = true;
        x = e.deltaX;
        y = e.deltaY;
        const rotate = x * 0.05;
        card.style.transform = `translate(${x}px, ${y}px) rotate(${rotate}deg)`;
        card.style.transition = 'none';

        // Opacity of stamps
        const opacity = Math.min(Math.abs(x) / 100, 1);
        if (x > 0) {
          stampLike.style.opacity = opacity;
          stampNope.style.opacity = 0;
        } else {
          stampNope.style.opacity = opacity;
          stampLike.style.opacity = 0;
        }
      });

      hammertime.on('panend', e => {
        isDragging = false;
        card.style.transition = 'transform 0.3s ease-out';
        
        const moveOutWidth = document.body.clientWidth;
        const keep = Math.abs(e.deltaX) < 80 && Math.abs(e.velocityX) < 0.5;

        if (keep) {
          card.style.transform = '';
          stampNope.style.opacity = 0;
          stampLike.style.opacity = 0;
        } else {
          const endX = Math.max(Math.abs(e.velocityX) * moveOutWidth, moveOutWidth);
          const toX = e.deltaX > 0 ? endX : -endX;
          const endY = Math.abs(e.velocityY) * moveOutWidth;
          const toY = e.deltaY > 0 ? endY : -endY;
          const rotate = toX * 0.05;
          card.style.transform = `translate(${toX}px, ${toY + e.deltaY}px) rotate(${rotate}deg)`;
          
          setTimeout(() => {
            card.remove();
            cards.pop();
            if (e.deltaX > 0) showMatch();
          }, 300);
        }
      });
    }

    window.triggerSwipe = function(direction) {
      if(cards.length === 0) return;
      const topCard = cards[cards.length - 1];
      const el = topCard.element;
      
      const toX = direction === 'right' ? 1000 : -1000;
      el.style.transition = 'transform 0.4s ease-in';
      el.style.transform = `translate(${toX}px, 50px) rotate(${direction === 'right' ? 30 : -30}deg)`;
      
      if(direction === 'right') el.querySelector('.stamp.like').style.opacity = 1;
      else el.querySelector('.stamp.nope').style.opacity = 1;

      setTimeout(() => {
        el.remove();
        cards.pop();
        if (direction === 'right') showMatch();
      }, 400);
    }
    
    function showMatch() {
      // Small delay for drama
      setTimeout(() => {
        document.getElementById('matchScreen').classList.add('show');
      }, 200);
    }

    initCards();
  </script>
</body>
</html>
